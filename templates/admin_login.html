{% extends "admin_base.html" %}

{% block content %}
<section class="admin-login-wrap">
    <div class="admin-login-card">
        <span class="admin-overline">LexNush Operations</span>
        <h1>Secure sign in</h1><p>Access is limited to the configured operator.</p>
        <form method="post" class="admin-login-form" novalidate>
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <div><label for="email">Email</label><input id="email" name="email" type="email" autocomplete="username" required></div>
            <div><label for="password">Password</label><input id="password" name="password" type="password" autocomplete="current-password" required></div>
            <button type="submit">Sign in securely</button>
        </form>
    </div>
</section>
{% endblock %}
