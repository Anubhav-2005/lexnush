services:
  - type: web
    name: lexnush
    runtime: python
    buildCommand: pip install -r requirements.txt && flask --app app db upgrade
    startCommand: gunicorn --workers 2 --threads 4 --timeout 30 --access-logfile - --error-logfile - wsgi:app
    healthCheckPath: /healthz
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: lexnush-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: lexnush-rate-limit
          property: connectionString
      - key: PUBLIC_BASE_URL
        sync: false
      - key: LEXNUSH_TRUSTED_HOSTS
        sync: false
      - key: TRUSTED_PROXY_COUNT
        value: "1"
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: CONTACT_RECIPIENT_EMAIL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: SENTRY_DSN
        sync: false
  - type: keyvalue
    name: lexnush-rate-limit
    ipAllowList: []
    maxmemoryPolicy: noeviction
databases:
  - name: lexnush-db
    databaseName: lexnush
    user: lexnush

# Set the sync:false values in Render before the first production deploy.
